<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cardápio da Semana</title>
<meta name="theme-color" content="#3E5C3E" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ===== Tela de login/cadastro ===== -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <span class="eyebrow">Cardápio da semana</span>
    <h1>Entrar</h1>
    <div id="auth-error" class="import-status hidden"></div>
    <label class="field-label">E-mail</label>
    <input type="email" id="auth-email" placeholder="voce@email.com" />
    <label class="field-label">Senha</label>
    <input type="password" id="auth-password" placeholder="••••••••" />
    <div class="action-row">
      <button class="btn btn-secondary btn-block" id="auth-signup-btn" onclick="handleSignUp()">Criar conta</button>
      <button class="btn btn-primary btn-block" id="auth-login-btn" onclick="handleSignIn()">Entrar</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">

  <header class="app-header">
    <button class="logout-btn" onclick="handleSignOut()" title="Sair">⏻</button>
    <span class="eyebrow">Cardápio da semana</span>
    <h1>O que vamos <em>comer</em>?</h1>
    <div id="header-stats" class="header-stats"></div>
  </header>

  <!-- ===== Aba: Semana ===== -->
  <section id="view-semana" class="view active">
    <div id="planner-days"></div>
  </section>

  <!-- ===== Aba: Pessoas ===== -->
  <section id="view-pessoas" class="view">
    <div id="people-stats" class="section-stats"></div>
    <button class="btn btn-primary btn-block" style="margin-bottom:14px" onclick="openNewPersonModal()">+ Nova pessoa</button>
    <div id="people-list"></div>
  </section>

  <!-- ===== Aba: Receitas ===== -->
  <section id="view-receitas" class="view">
    <div class="action-row" style="margin-bottom:14px">
      <button class="btn btn-secondary" onclick="openImportModal()">✨ Importar com IA</button>
      <button class="btn btn-primary" onclick="openNewRecipeModal()">+ Nova receita</button>
    </div>
    <div id="recipe-filters" class="filter-pills"></div>
    <div id="recipes-list"></div>
  </section>

  <!-- ===== Aba: Lista ===== -->
  <section id="view-lista" class="view">
    <div id="lista-content"></div>
  </section>

</div>

<nav class="tabbar">
  <div class="tabbar-inner">
    <button class="tab-btn active" data-view="semana" onclick="switchView('semana')">
      <span class="tab-icon">📅</span>Semana
    </button>
    <button class="tab-btn" data-view="pessoas" onclick="switchView('pessoas')">
      <span class="tab-icon">👪</span>Pessoas
    </button>
    <button class="tab-btn" data-view="receitas" onclick="switchView('receitas')">
      <span class="tab-icon">📖</span>Receitas
    </button>
    <button class="tab-btn" data-view="lista" onclick="switchView('lista')">
      <span class="tab-icon">🧺</span>Lista
    </button>
  </div>
</nav>

<!-- ===== Modal: Nova pessoa ===== -->
<div id="modal-new-person" class="modal-backdrop hidden">
  <div class="modal-sheet">
    <h2>Nova pessoa</h2>

    <label class="field-label">Nome</label>
    <input type="text" id="np-name" placeholder="Ex: Ana" />

    <label class="field-label">Faixa etária / perfil</label>
    <select id="np-profile" onchange="updateProfileFieldsVisibility()">
      <option value="crianca_pequena">Criança (2–6 anos)</option>
      <option value="crianca">Criança (7–12 anos)</option>
      <option value="adolescente">Adolescente (13–17 anos)</option>
      <option value="mulher_adulta" selected>Mulher adulta</option>
      <option value="homem_adulto">Homem adulto</option>
      <option value="idoso">Idoso (65+)</option>
      <option value="personalizado">Personalizado (ex: dieta própria)</option>
    </select>

    <div id="np-activity-wrap">
      <label class="field-label">Nível de atividade</label>
      <select id="np-activity">
        <option value="sedentario">Pouco ativo</option>
        <option value="moderado" selected>Ativo normal</option>
        <option value="ativo">Muito ativo / treina pesado</option>
      </select>
    </div>

    <div id="np-factor-wrap" class="hidden">
      <label class="field-label">Fator de porção (1.0 = adulto padrão)</label>
      <input type="number" id="np-factor" min="0.1" step="0.1" value="1" />
    </div>

    <div class="action-row">
      <button class="btn btn-secondary" onclick="closeNewPersonModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewPerson()">Salvar pessoa</button>
    </div>
  </div>
</div>

<!-- ===== Modal: Importar receita com IA ===== -->
<div id="modal-import-recipe" class="modal-backdrop hidden">
  <div class="modal-sheet">
    <div class="modal-close-row">
      <h2>Importar receita</h2>
      <button type="button" class="modal-x" onclick="closeImportModal()">✕</button>
    </div>
    <div class="import-platforms" id="import-platforms"></div>
    <p class="import-hint">Importe de qualquer rede social, site de receita ou documento.</p>

    <input type="text" id="import-link-input" placeholder="Colar link" />

    <div class="import-or"><span>ou</span></div>

    <div class="import-icon-grid">
      <label class="import-icon-btn">
        <input type="file" id="import-image-input" accept="image/*" class="hidden" onchange="handleImportImage(event)" />
        <span class="import-icon-circle">🖼️</span>
        Imagem
      </label>
      <button type="button" class="import-icon-btn" onclick="toggleImportTextArea()">
        <span class="import-icon-circle">📝</span>
        Texto
      </button>
      <label class="import-icon-btn">
        <input type="file" id="import-pdf-input" accept="application/pdf" class="hidden" onchange="handleImportPdf(event)" />
        <span class="import-icon-circle">📄</span>
        PDF
      </label>
      <label class="import-icon-btn">
        <input type="file" id="import-video-input" accept="video/*" class="hidden" onchange="handleImportVideo(event)" />
        <span class="import-icon-circle">🎬</span>
        Vídeo
      </label>
    </div>

    <textarea id="import-text" rows="5" class="hidden" placeholder="Cole a receita completa, ou a legenda do vídeo como contexto extra..."></textarea>

    <div id="import-status" class="import-status hidden"></div>

    <button class="btn btn-primary btn-block" id="import-extract-btn" onclick="handleImportSubmit()" style="margin-top:16px">Importar</button>

    <div id="import-review"></div>
  </div>
</div>

<!-- ===== Modal: Histórico de listas ===== -->
<div id="modal-list-history" class="modal-backdrop hidden">
  <div class="modal-sheet">
    <h2>Histórico de listas</h2>
    <div id="history-content"></div>
    <div class="action-row">
      <button class="btn btn-secondary btn-block" onclick="closeHistoryModal()">Fechar</button>
    </div>
  </div>
</div>

<!-- ===== Modal: Detalhe da receita ===== -->
<div id="modal-recipe-detail" class="modal-backdrop hidden">
  <div class="modal-sheet modal-sheet-flush">
    <div id="recipe-detail-content"></div>
  </div>
</div>

<!-- ===== Modal: Nova receita ===== -->
<div id="modal-new-recipe" class="modal-backdrop hidden">
  <div class="modal-sheet">
    <h2 id="recipe-modal-title">Nova receita</h2>

    <label class="field-label">Nome</label>
    <input type="text" id="nr-name" placeholder="Ex: Frango à parmegiana" />

    <label class="field-label">Categoria</label>
    <select id="nr-category">
      <option value="café da manhã">Café da manhã</option>
      <option value="prato principal" selected>Prato principal</option>
      <option value="acompanhamento">Acompanhamento</option>
      <option value="sobremesa">Sobremesa</option>
    </select>

    <label class="field-label">Modo de preparo (um passo por linha)</label>
    <textarea id="nr-instructions" rows="5" placeholder="Ex:&#10;Tempere a carne com sal e pimenta.&#10;Aqueça a panela e sele os dois lados."></textarea>

    <label class="field-label">Rende quantas porções</label>
    <input type="number" id="nr-servings" min="1" value="4" />

    <label class="field-label">Ingredientes</label>
    <div id="nr-ingredients"></div>
    <button class="btn-ghost" onclick="addIngRow()">+ adicionar ingrediente</button>

    <div class="action-row">
      <button class="btn btn-secondary" onclick="closeNewRecipeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewRecipe()">Salvar receita</button>
    </div>
  </div>
</div>

<script src="vendor/supabase.js"></script>
<script src="vendor/pdf-lib.min.js"></script>
<script src="vendor/pdf.min.js"></script>
<script src="config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
